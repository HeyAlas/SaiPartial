<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You Are Invited — Princess Rexaine</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Great+Vibes&family=Lato:wght@300&display=swap" rel="stylesheet" />

  <style>
    :root {
      --linen:      #F5F1EA;
      --sand:       #EAE3D6;
      --beige:      #D7C9B8;
      --camel:      #B2967D;
      --espresso:   #583f33;
      --gold:       #C9A96E;
      --gold-light: #E8D5A3;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: radial-gradient(ellipse at center, #2a1a12 0%, #0e0806 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Cormorant Garamond', serif;
    }

    /* ── Ambient floating particles ── */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0;
      animation: drift linear infinite;
    }

    @keyframes drift {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* ── Scene wrapper ── */
    #envelopeIntro {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: opacity 1s ease, transform 1s ease;
      gap: 32px;
    }

    #envelopeIntro.hide {
      opacity: 0;
      transform: scale(1.06);
      pointer-events: none;
    }

    /* ── Pre-title ── */
    .pre-label {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: clamp(0.75rem, 2vw, 0.9rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0;
      animation: fadeUp 1s ease 0.3s forwards;
    }

    .script-title {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(2.6rem, 8vw, 4.5rem);
      color: #fff;
      line-height: 1;
      text-shadow: 0 0 40px rgba(201,169,110,0.4);
      opacity: 0;
      animation: fadeUp 1.2s ease 0.6s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ══════════════════════════════════════
       THE ENVELOPE
    ══════════════════════════════════════ */
    #envelope {
      position: relative;
      width: min(380px, 86vw);
      height: min(260px, 58vw);
      cursor: pointer;
      perspective: 1200px;
      opacity: 0;
      animation: fadeUp 1.2s ease 0.9s forwards;
      filter: drop-shadow(0 20px 60px rgba(0,0,0,0.7));
    }

    /* Base envelope body */
    .env-body {
      position: absolute;
      inset: 0;
      border-radius: 4px 4px 8px 8px;
      overflow: hidden;
    }

    /* Envelope back — lower z */
    .env-back {
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, #4a2e20 0%, #2d1a0f 100%);
      border: 1px solid rgba(201,169,110,0.25);
      border-radius: 4px 4px 8px 8px;
      z-index: 1;
    }

    /* V-shaped bottom flap */
    .env-back::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 55%;
      background: linear-gradient(175deg, #3a2314 0%, #1e0e08 100%);
      clip-path: polygon(0% 100%, 50% 0%, 100% 100%);
    }

    /* Left & right triangular side panels */
    .env-side-left,
    .env-side-right {
      position: absolute;
      bottom: 0;
      width: 51%;
      height: 58%;
      z-index: 2;
    }

    .env-side-left {
      left: 0;
      background: linear-gradient(120deg, #3b2216 0%, #261409 100%);
      clip-path: polygon(0% 100%, 0% 0%, 100% 100%);
    }

    .env-side-right {
      right: 0;
      background: linear-gradient(240deg, #3b2216 0%, #261409 100%);
      clip-path: polygon(100% 100%, 100% 0%, 0% 100%);
    }

    /* Gold border lines on side panels */
    .env-side-left::after,
    .env-side-right::after {
      content: '';
      position: absolute;
      inset: 0;
      border: 1px solid rgba(201,169,110,0.18);
    }

    /* ── TOP FLAP (the part that opens) ── */
    .env-flap {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 55%;
      z-index: 5;
      transform-origin: top center;
      transform-style: preserve-3d;
      transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .env-flap-inner {
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, #5a3825 0%, #3a2010 100%);
      clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
      border-left: 1px solid rgba(201,169,110,0.2);
      border-right: 1px solid rgba(201,169,110,0.2);
    }

    /* Gold ornament on flap */
    .env-flap-ornament {
      position: absolute;
      bottom: 30%;
      left: 50%;
      transform: translateX(-50%);
      width: 36px;
      height: 36px;
      opacity: 0.85;
    }

    /* ── WAX SEAL ── */
    .env-seal {
      position: absolute;
      top: 48%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 64px;
      height: 64px;
      z-index: 8;
      transition: transform 0.4s ease, opacity 0.8s ease 0.6s;
    }

    .env-seal svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
    }

    /* ── LETTER peeking out ── */
    .env-letter {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%) translateY(0px);
      width: 88%;
      height: 75%;
      z-index: 3;
      background: linear-gradient(170deg, var(--linen) 0%, var(--sand) 100%);
      border: 1px solid rgba(201,169,110,0.35);
      border-radius: 3px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 16px;
      opacity: 0;
      transition: transform 1.2s cubic-bezier(0.22,1,0.36,1) 0.3s,
                  opacity 0.5s ease 0.5s;
    }

    .env-letter .letter-line {
      width: 60%;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
    }

    .env-letter .letter-name {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      color: var(--espresso);
      line-height: 1;
    }

    .env-letter .letter-sub {
      font-family: 'Lato', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--camel);
    }

    /* ── OPEN STATE ── */
    #envelope.open .env-flap {
      transform: rotateX(-180deg);
    }

    #envelope.open .env-seal {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.7);
    }

    #envelope.open .env-letter {
      opacity: 1;
      transform: translateX(-50%) translateY(-72%);
    }

    /* ── Shimmer / gold border on hover ── */
    #envelope::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 6px 6px 10px 10px;
      background: linear-gradient(135deg,
        transparent 20%,
        rgba(201,169,110,0.3) 50%,
        transparent 80%);
      opacity: 0;
      transition: opacity 0.4s ease;
      z-index: 0;
      pointer-events: none;
    }

    #envelope:hover::before { opacity: 1; }

    /* Gold edge glow on hover */
    #envelope:hover {
      filter: drop-shadow(0 20px 60px rgba(0,0,0,0.7))
              drop-shadow(0 0 20px rgba(201,169,110,0.25));
    }

    /* ── Hint text ── */
    .click-hint {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: clamp(0.72rem, 2vw, 0.82rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(232,213,163,0.55);
      opacity: 0;
      animation: fadeUp 1.2s ease 1.4s forwards, pulse 2.5s ease 2.6s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.55; }
      50%       { opacity: 0.9; }
    }

    /* ── Confetti burst on open ── */
    .confetti-piece {
      position: fixed;
      width: 7px;
      height: 7px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 999;
      animation: confettiFall 1.8s ease forwards;
    }

    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
      100% { transform: translateY(200px) rotate(720deg) scale(0.4); opacity: 0; }
    }
  </style>
</head>
<body>

<!-- Ambient particles -->
<div class="particles" id="particles"></div>

<!-- Envelope intro screen -->
<div id="envelopeIntro">
  <p class="pre-label">A personal invitation for you</p>
  <h1 class="script-title">Princess Rexaine</h1>

  <div id="envelope">
    <!-- Back of envelope -->
    <div class="env-back"></div>
    <div class="env-side-left"></div>
    <div class="env-side-right"></div>

    <!-- Letter peeking out -->
    <div class="env-letter">
      <div class="letter-line"></div>
      <p class="letter-sub">An Evening of</p>
      <p class="letter-name">Eighteen</p>
      <div class="letter-line"></div>
      <p class="letter-sub">April 24, 2026</p>
    </div>

    <!-- Top flap -->
    <div class="env-flap">
      <div class="env-flap-inner"></div>
      <!-- Gold ornament SVG on flap -->
      <svg class="env-flap-ornament" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="18" cy="18" r="14" stroke="#C9A96E" stroke-width="0.8" opacity="0.6"/>
        <circle cx="18" cy="18" r="10" stroke="#C9A96E" stroke-width="0.5" opacity="0.4"/>
        <path d="M18 8 L19.2 15.5 L26.5 15.5 L20.6 20 L22.8 27.5 L18 23 L13.2 27.5 L15.4 20 L9.5 15.5 L16.8 15.5 Z"
              fill="#C9A96E" opacity="0.7"/>
      </svg>
    </div>

    <!-- Wax seal -->
    <div class="env-seal">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="sealGrad" cx="40%" cy="35%">
            <stop offset="0%"  stop-color="#e8c47a"/>
            <stop offset="50%" stop-color="#C9A96E"/>
            <stop offset="100%" stop-color="#8a6030"/>
          </radialGradient>
        </defs>
        <!-- Drip shape -->
        <ellipse cx="32" cy="30" rx="22" ry="20" fill="url(#sealGrad)"/>
        <ellipse cx="32" cy="30" rx="22" ry="20" fill="none" stroke="#8a6030" stroke-width="0.5" opacity="0.5"/>
        <!-- Inner circle -->
        <circle cx="32" cy="29" r="15" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>
        <!-- R monogram -->
        <text x="32" y="34" text-anchor="middle"
              font-family="Cormorant Garamond, serif"
              font-size="17" font-weight="600"
              fill="rgba(74,52,42,0.85)" letter-spacing="0.5">R</text>
        <!-- Decorative dots around seal -->
        <circle cx="32" cy="10" r="1.5" fill="#C9A96E" opacity="0.5"/>
        <circle cx="51" cy="20" r="1.2" fill="#C9A96E" opacity="0.4"/>
        <circle cx="51" cy="40" r="1.2" fill="#C9A96E" opacity="0.4"/>
        <circle cx="32" cy="50" r="1.5" fill="#C9A96E" opacity="0.5"/>
        <circle cx="13" cy="40" r="1.2" fill="#C9A96E" opacity="0.4"/>
        <circle cx="13" cy="20" r="1.2" fill="#C9A96E" opacity="0.4"/>
      </svg>
    </div>
  </div>

  <p class="click-hint">✦ &nbsp; Tap to open your invitation &nbsp; ✦</p>
</div>


<script>
  // ── Ambient particles
  const pc = document.getElementById('particles');
  for (let i = 0; i < 28; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 3 + 1;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      animation-duration:${6 + Math.random()*10}s;
      animation-delay:${Math.random()*8}s;
    `;
    pc.appendChild(p);
  }

  // ── Envelope open
  const envelope = document.getElementById('envelope');
  const intro    = document.getElementById('envelopeIntro');
  let opened = false;

  envelope.addEventListener('click', () => {
    if (opened) return;
    opened = true;

    // Gold confetti burst
    const colors = ['#C9A96E','#E8D5A3','#fff8e8','#b2967d','#fffbe6'];
    for (let i = 0; i < 30; i++) {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      const rect = envelope.getBoundingClientRect();
      c.style.cssText = `
        left:${rect.left + rect.width/2 + (Math.random()-0.5)*120}px;
        top:${rect.top + rect.height/2}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        transform-origin:center;
        animation-delay:${Math.random()*0.4}s;
        animation-duration:${1.4 + Math.random()*0.8}s;
      `;
      document.body.appendChild(c);
      c.addEventListener('animationend', () => c.remove());
    }

    envelope.classList.add('open');

    setTimeout(() => {
      intro.classList.add('hide');
    }, 1800);

    setTimeout(() => {
      intro.style.display = 'none';
      // ── redirect or reveal your main site here:
      window.location.href = 'main.html';
    }, 2800);
  });
</script>
<script src="envelope.js"></script>
</body>
</html>
